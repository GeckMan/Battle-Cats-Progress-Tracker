name: Sync BCData

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npx prisma generate
      - name: Run BCData sync
        id: sync
        # sync-bcdata.ts now exits nonzero when its own coverage checks find
        # something review-worthy (unclassified units, isCollab evidence
        # mismatches, untranslated/placeholder names, etc.) even though every
        # write it made still succeeded — see the reviewWarningCount comment
        # at the end of its main(). continue-on-error lets the rest of this
        # job (medal image sync + commit) run exactly as normal either way;
        # the dedicated step at the bottom re-fails the whole job afterward
        # so this is never silently swallowed.
        continue-on-error: true
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx ./scripts/sync-bcdata.ts
      - name: Fetch any missing medal artwork from the wiki
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx ./scripts/sync-medal-images.ts
      - name: Commit newly-downloaded medal images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/medals
          if git diff --cached --quiet; then
            echo "No new medal images to commit"
          else
            git commit -m "chore: add newly-synced medal images"
            # Earlier steps (npm install, prisma generate) can leave the
            # working tree with unrelated unstaged changes — e.g. `prisma
            # generate` re-emits src/generated/prisma, which is checked into
            # git and often comes out byte-different. `git pull --rebase`
            # refuses to run with ANY unstaged changes present, even ones
            # that have nothing to do with our commit, so discard them first
            # (safe: our actual payload is already committed above, this is
            # just disposable regenerated build output).
            git checkout -- .
            # main may have moved since actions/checkout ran at the start of
            # this job (e.g. someone pushed in the meantime) — rebase onto
            # the latest before pushing so this doesn't get rejected as a
            # non-fast-forward.
            git pull --rebase origin main
            git push
          fi
      - name: Fail the job if the sync found anything needing review
        # Runs last, after medal images have already synced/committed
        # normally. steps.sync.outcome is "failure" both when sync-bcdata.ts
        # crashed outright AND when it completed but flagged review-worthy
        # coverage findings (see the "Run BCData sync" step above) — either
        # way, the job as a whole should end red so GitHub's default
        # workflow-failure-notification email actually fires instead of a
        # plain green checkmark hiding it.
        if: steps.sync.outcome == 'failure'
        run: |
          echo "::error::BCData sync finished with something needing review — see the 'Run BCData sync' step's log for details (unclassified units, isCollab evidence mismatches, untranslated names, etc., or an actual crash)."
          exit 1
