name: Sync BCData

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npx prisma generate
      - name: Run BCData sync
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx ./scripts/sync-bcdata.ts
      - name: Fetch any missing medal artwork from the wiki
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx ./scripts/sync-medal-images.ts
      - name: Commit newly-downloaded medal images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/medals
          if git diff --cached --quiet; then
            echo "No new medal images to commit"
          else
            git commit -m "chore: add newly-synced medal images"
            git push
          fi
